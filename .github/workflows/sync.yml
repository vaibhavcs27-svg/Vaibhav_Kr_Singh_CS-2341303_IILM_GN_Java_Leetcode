name: Sync to vaibhavcs27-svg

on:
  push:
    branches: [ "master", "main" ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to vaibhavcs27-svg
        run: |
          git config --global user.name "GitHub Action Sync"
          git config --global user.email "action@github.com"
          git remote add destination https://vaibhavcs27-svg:${{ secrets.SYNC_TOKEN }}@github.com/vaibhavcs27-svg/Vaibhav_Kr_Singh_CS-2341303_IILM_GN_Java_Leetcode.git
          git push destination --all --force
