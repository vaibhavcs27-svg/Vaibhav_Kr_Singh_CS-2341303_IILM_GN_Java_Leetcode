version: '3.8'

services:
  # Relational Database for Transactions & Identity
  postgres:
    image: postgres:15-alpine
    container_name: aeronexus-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: aeronexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # NoSQL Database for Flight Logs & Baggage
  mongodb:
    image: mongo:6
    container_name: aeronexus-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # In-memory Cache for Live States (Gates, Trucks)
  redis:
    image: redis:7-alpine
    container_name: aeronexus-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Message Broker for Notifications
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: aeronexus-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: aeronexus-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
  mongo_data:
